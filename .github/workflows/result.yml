name: Build Test and Push Result Image

on:
  push:
    branches:
      - main
    paths:
      - 'result/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUP_USERNAME }}/result
  IMAGE_TAG: 1.0

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./result

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make test script executable
        run: chmod +x result/test/tests.sh

      - name: Run tests
        run: ./result/test/tests.sh

  push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUP_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (same as build stage)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./result

      - name: Push image
        run: docker push $IMAGE_NAME:$IMAGE_TAG
