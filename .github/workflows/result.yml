name: Build Test and Push Result Image

on:
  push:
    branches:
      - main
    paths:
      - 'result/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUP_USERNAME }}/result
  IMAGE_TAG: 1.0

jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        id: image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          echo "name=$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make test script executable
        run: chmod +x test.sh

      - name: Run tests
        run: ./test.sh

  push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image again (safe CI approach)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push image
        run: docker push $IMAGE_NAME:$IMAGE_TAG
