name: Build Test and Push Result Image
on:
  push:
    branches:
      - main
    paths:
      - 'result/**'
  workflow_dispatch:
permissions:
  contents: read
env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUP_USERNAME }}/result
  IMAGE_TAG: 1.0
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./result
      - name: Save image to tarball
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o result-image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-image
          path: result-image.tar

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: result-image
      - name: Load image
        run: docker load -i result-image.tar
      - name: Run container
        run: docker run -d --name result-app -p 4000:80 $IMAGE_NAME:$IMAGE_TAG
      - name: Check container is running
        run: docker ps
      - name: Wait for app to respond
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:4000 > /dev/null; then
              echo "App is up"
              break
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done
      - name: Curl test - check response headers
        run: curl -i http://localhost:4000
      - name: Curl test - check HTTP status code
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000)
          echo "Status code: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "FAIL: expected 200, got $STATUS"
            exit 1
          fi
          echo "PASS"
      - name: Show logs on failure
        if: failure()
        run: docker logs result-app
      - name: Cleanup
        if: always()
        run: docker rm -f result-app

  push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: result-image
      - name: Load image
        run: docker load -i result-image.tar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUP_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push image
        run: docker push $IMAGE_NAME:$IMAGE_TAG
