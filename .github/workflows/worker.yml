name: Build Test and Push Worker Image
on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
  workflow_dispatch:
permissions:
  contents: read
env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/worker
  IMAGE_TAG: 1.0
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./worker
      - name: Save image to tarball
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o worker-image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-image
          path: worker-image.tar
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-image
      - name: Load image
        run: docker load -i worker-image.tar
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
      - name: Run container
        run: docker run -d --name worker-app $IMAGE_NAME:$IMAGE_TAG
      - name: Check container is running
        run: docker ps
      - name: Wait and check container did not crash
        run: |
          sleep 10
          STATUS=$(docker inspect --format='{{.State.Status}}' worker-app)
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "FAIL: worker container is not running (status=$STATUS)"
            docker logs worker-app
            exit 1
          fi
          echo "PASS: worker container is running"
      - name: Show logs
        run: docker logs worker-app
      - name: Cleanup
        if: always()
        run: docker rm -f worker-app
  push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-image
      - name: Load image
        run: docker load -i worker-image.tar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Push image
        run: docker push $IMAGE_NAME:$IMAGE_TAG
