apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  namespace: voting-app
  labels:
    app: vote
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: vote
  strategy:
    type: RollingUpdate  
    rollingUpdate:
      maxSurge: 1  
      maxUnavailable: 1  
  minReadySeconds: 10  
  revisionHistoryLimit: 5 
  progressDeadlineSeconds: 600  
  template:
    metadata:
      labels:
        app: vote
    spec:
      serviceAccountName: voting-app-sa
      containers:
      - name: vote
        image: ahmedmohamed80/vote:1 
        ports:
        - containerPort: 80  
        envFrom:
        - configMapRef:
            name: voting-app-config
        resources:  
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:  
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:  
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vote
  namespace: voting-app
spec:
  type: LoadBalancer
  selector:
    app: vote
  ports:
    - port: 80
      targetPort: 80
