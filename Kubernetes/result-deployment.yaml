apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  namespace: voting-app
  labels:
    app: result
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: result
  strategy:
    type: RollingUpdate  
    rollingUpdate:
      maxSurge: 1  
      maxUnavailable: 1  
  minReadySeconds: 10  
  revisionHistoryLimit: 5  
  progressDeadlineSeconds: 600  
  template:
    metadata:
      labels:
        app: result
    spec:
      serviceAccountName: voting-app-sa
      containers:
      - name: result
        image: ahmedmohamed80/result:1
        ports:
        - containerPort: 80  
        envFrom:
        - configMapRef:
            name: voting-app-config
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: voting-app-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: voting-app-secret
              key: POSTGRES_PASSWORD
        resources: 
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:  
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:  
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: result
  namespace: voting-app
spec:
  type: LoadBalancer
  selector:
    app: result
  ports:
    - port: 80
      targetPort: 80
