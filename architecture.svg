<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Voting app architecture and data flow</title>
  <desc>A browser sends votes to the vote service, which writes to Redis. A worker reads from Redis and writes to Postgres. The result service reads from Postgres and serves live results back to the browser.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="320" fill="#ffffff"/>

  <!-- Browser (vote) -->
  <rect x="40" y="40" width="140" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="110" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">Browser</text>
  <text x="110" y="76" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">User casts vote</text>

  <!-- vote -->
  <rect x="40" y="140" width="140" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="110" y="158" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042c53">vote</text>
  <text x="110" y="176" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0c447c">Deployment, 2 replicas</text>

  <line x1="110" y1="96" x2="110" y2="138" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- redis -->
  <rect x="270" y="140" width="140" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4a1b0c">redis</text>
  <text x="340" y="176" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712b13">StatefulSet, vote queue</text>

  <line x1="180" y1="168" x2="268" y2="168" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- worker -->
  <rect x="270" y="240" width="140" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="340" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215c">worker</text>
  <text x="340" y="276" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3c3489">Deployment, 1 replica</text>

  <line x1="340" y1="196" x2="340" y2="238" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- db (postgres) -->
  <rect x="500" y="240" width="140" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text x="570" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4a1b0c">db (postgres)</text>
  <text x="570" y="276" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712b13">StatefulSet, storage</text>

  <line x1="410" y1="268" x2="498" y2="268" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- result -->
  <rect x="500" y="140" width="140" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="570" y="158" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042c53">result</text>
  <text x="570" y="176" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0c447c">Deployment, 2 replicas</text>

  <line x1="570" y1="238" x2="570" y2="198" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Browser (result) -->
  <rect x="500" y="40" width="140" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="570" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">Browser</text>
  <text x="570" y="76" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Sees live results</text>

  <line x1="570" y1="138" x2="570" y2="98" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
